<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FarmaAvisa — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--v:#1a6b4a;--vc:#2d9166;--vp:#e8f5ee;--vm:#c2e8d3;--ac:#f0a500;--fondo:#f7faf8;--blanco:#fff;--gris:#6b7a72;--gc:#edf1ef;--texto:#1c2b22;--danger:#d93025;--info:#1a6b9a;--purple:#7c3aed;--wa:#25d366;--wa-dark:#128c7e;--sh:0 2px 12px rgba(26,107,74,.10);--shl:0 6px 32px rgba(26,107,74,.14);--r:14px;--rs:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh}
#SB{position:fixed;top:0;left:0;width:230px;height:100vh;background:var(--v);display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 24px rgba(0,0,0,.12)}
.sl{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
.sl-top{display:flex;align-items:center;gap:10px}
.sl-ic{width:38px;height:38px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;overflow:hidden}
.sl-tx h1{font-family:'DM Serif Display',serif;font-size:1.15rem;color:#fff;line-height:1.1}
.sl-tx h1 span{color:#a8f0ce}
.sl-tx p{font-size:.62rem;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
.snav{flex:1;padding:8px 0;overflow-y:auto}
.ni{position:relative;display:flex;align-items:center;gap:10px;padding:10px 18px;color:rgba(255,255,255,.78);font-size:.86rem;font-weight:500;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,.09);color:#fff}
.ni.act{background:rgba(255,255,255,.15);color:#fff;border-left-color:var(--ac)}
.ni-ic{width:19px;text-align:center;font-size:1rem}
.ni-badge{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--danger);color:#fff;font-size:.6rem;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sfooter{padding:10px 18px;border-top:1px solid rgba(255,255,255,.12)}
.urow{display:flex;align-items:center;gap:8px;padding:4px 0}
.uav{width:30px;height:30px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;color:#fff}
.uname{color:#fff;font-weight:600;font-size:.8rem}
.urole{color:rgba(255,255,255,.5);font-size:.69rem}
#main{margin-left:230px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--blanco);border-bottom:1px solid var(--gc);padding:11px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.topbar h2{font-family:'DM Serif Display',serif;font-size:1.18rem;color:var(--v)}
.topbar-r{margin-left:auto;display:flex;gap:9px;align-items:center}
.sbox{display:flex;align-items:center;gap:7px;background:var(--gc);border-radius:30px;padding:6px 14px}
.sbox input{border:none;background:transparent;outline:none;font-size:.86rem;font-family:'DM Sans',sans-serif;width:180px}
.content{padding:20px 24px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:30px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--v);color:#fff}.btn-primary:hover{background:var(--vc)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b5271e}
.btn-outline{background:transparent;border:2px solid var(--v);color:var(--v)}.btn-outline:hover{background:var(--vp)}
.btn-ghost{background:var(--gc);color:var(--gris)}.btn-ghost:hover{background:#dde3df}
.btn-info{background:var(--info);color:#fff}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-warn{background:var(--ac);color:#fff}
.btn-wa{background:var(--wa);color:#fff;font-weight:700}.btn-wa:hover{background:var(--wa-dark)}
.btn-sm{padding:4px 11px;font-size:.75rem}
.card{background:var(--blanco);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.card-hd{padding:12px 18px;border-bottom:1px solid var(--gc);display:flex;align-items:center;gap:9px}
.card-hd h3{font-size:.97rem;font-weight:600;font-family:'DM Serif Display',serif;flex:1}
.card-bd{padding:16px 18px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.pc{background:var(--blanco);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;cursor:pointer;transition:all .15s;border:2px solid transparent}
.pc:hover{border-color:var(--vm);box-shadow:var(--shl);transform:translateY(-2px)}
.pc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pav{width:39px;height:39px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--vc));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.93rem;flex-shrink:0}
.pname{font-weight:600;font-size:.9rem;line-height:1.3}.pdni{font-size:.74rem;color:var(--gris)}
.prow{font-size:.77rem;color:var(--gris);margin-bottom:2px}
.pbadges{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.mb{font-size:.64rem;font-weight:600;padding:2px 7px;border-radius:20px;border:1px solid}
.mb-c{color:var(--v);border-color:var(--v);background:var(--vp)}.mb-s{color:var(--info);border-color:var(--info);background:#e8f3fa}.mb-ok{color:#059669;border-color:#059669;background:#d1fae5}
.pc-ac{display:flex;gap:5px;margin-top:8px;border-top:1px solid var(--gc);padding-top:7px}
.pdhdr{background:var(--blanco);border-radius:var(--r);box-shadow:var(--sh);padding:17px 21px;margin-bottom:13px;display:flex;gap:15px;align-items:flex-start}
.pdav{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.25rem;font-weight:700;flex-shrink:0}
.pdi h2{font-family:'DM Serif Display',serif;font-size:1.3rem}
.dfields{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 12px;margin-top:7px}
.df{font-size:.79rem}.df label{color:var(--gris);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;display:block}.df span{font-weight:500}.df.full{grid-column:1/-1}
.mtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.mtab{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:30px;font-size:.81rem;font-weight:600;border:2px solid var(--gc);background:var(--blanco);color:var(--gris);cursor:pointer;transition:all .15s}
.mtab:hover{border-color:var(--v);color:var(--v)}.mtab.active{background:var(--v);border-color:var(--v);color:#fff}
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{text-align:left;font-size:.69rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gris);padding:6px 9px;background:var(--gc);font-weight:600}
.tbl td{padding:8px 9px;border-bottom:1px solid var(--gc);vertical-align:middle}
.tbl tr:hover td{background:var(--vp)}
.sp{font-size:.69rem;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block}
.sp-ok{background:#d4f5e2;color:#1a6b4a}.sp-w{background:#fef4d8;color:#b07800}.sp-d{background:#fde8e6;color:var(--danger)}.sp-r{background:#fde8e6;color:var(--danger)}
.mr{display:grid;gap:7px;align-items:center;padding:7px 9px;border-bottom:1px solid var(--gc);font-size:.8rem}
.mr.bp{grid-template-columns:98px 56px 56px 64px 86px 1fr auto auto}
.mr.gl{grid-template-columns:98px 76px 94px 76px 1fr auto}
.mr-hd{font-size:.69rem;color:var(--gris);text-transform:uppercase;font-weight:600;background:var(--gc);border-radius:6px 6px 0 0}
.vc-card{background:var(--gc);border-radius:var(--rs);padding:10px 13px;margin-bottom:7px;display:flex;gap:12px;align-items:center}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:var(--blanco);border-radius:var(--r);box-shadow:var(--shl);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.mhd{padding:14px 20px;border-bottom:1px solid var(--gc);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--blanco);z-index:1}
.mhd h3{font-family:'DM Serif Display',serif;font-size:1.06rem}
.mcl{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--gris);padding:3px 7px;border-radius:5px}.mcl:hover{background:var(--gc)}
.mbd{padding:18px 20px}.mft{padding:10px 20px;border-top:1px solid var(--gc);display:flex;gap:9px;justify-content:flex-end;flex-wrap:wrap}
.fg{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.fg.c1{grid-template-columns:1fr}.fg.c3{grid-template-columns:repeat(3,1fr)}
.fp{display:flex;flex-direction:column;gap:4px}.fp.full{grid-column:1/-1}
.fp label{font-size:.75rem;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.04em}
.fp input,.fp select,.fp textarea{padding:7px 10px;border:1.5px solid var(--gc);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border .15s;background:var(--blanco)}
.fp input:focus,.fp select:focus,.fp textarea:focus{border-color:var(--vc)}
.fp textarea{resize:vertical;min-height:60px}
.tip{background:var(--vp);border-radius:7px;padding:7px 11px;font-size:.79rem;margin-top:8px;line-height:1.5}
.empty{text-align:center;padding:28px 16px;color:var(--gris)}.empty .ei{font-size:2rem;display:block;margin-bottom:7px}
.oe{background:var(--blanco);border:1.5px solid var(--gc);border-radius:var(--rs);padding:12px 15px;margin-bottom:9px}
.oeh{display:flex;align-items:center;gap:9px;margin-bottom:6px;flex-wrap:wrap}
.ot{font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:20px}
.ot-r{background:#fde8e6;color:var(--danger)}.ot-o{background:var(--vp);color:var(--v)}.ot-m{background:#e8f3fa;color:var(--info)}.ot-x{background:var(--gc);color:var(--gris)}
.otx{font-size:.84rem;line-height:1.5}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.stat-c{background:var(--blanco);border-radius:var(--r);padding:15px 17px;box-shadow:var(--sh);border-left:4px solid transparent;display:flex;align-items:center;gap:11px}
.stat-c.ok{border-color:var(--v)}.stat-c.wn{border-color:var(--ac)}.stat-c.pu{border-color:var(--purple)}.stat-c.wa{border-color:var(--wa)}
.snum{font-size:1.6rem;font-weight:700;font-family:'DM Serif Display',serif}.slabel{font-size:.74rem;color:var(--gris)}
.role-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block}
.rb-owner{background:#fef3c7;color:#b45309}.rb-staff{background:#e8f3fa;color:#1a6b9a}
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
.pin-box{background:#fff;border-radius:16px;padding:28px 24px;width:300px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.3)}
.pin-box h3{font-family:'DM Serif Display',serif;color:var(--v);margin-bottom:6px;font-size:1.1rem}
.pin-box p{font-size:.8rem;color:var(--gris);margin-bottom:16px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:18px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--vc);background:transparent;transition:background .15s}
.pin-dot.filled{background:var(--v)}
.pin-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:12px;border:1.5px solid var(--gc);border-radius:10px;font-size:1.1rem;font-weight:600;background:#fff;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.pin-key:hover{background:var(--vp);border-color:var(--v)}.pin-key.del{color:var(--danger)}
.pin-err{color:var(--danger);font-size:.78rem;margin-top:8px;min-height:18px}
/* NOTIF CARDS */
.nc{background:var(--blanco);border-radius:var(--r);box-shadow:var(--sh);padding:13px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;border-left:4px solid transparent}
.nc.pendiente{border-left-color:#f0a500}
.nc.lista{border-left-color:var(--wa);background:#f0fff6}
.nc.historial{border-left-color:var(--gc);opacity:.75}
.nc-ic{font-size:1.4rem;flex-shrink:0;margin-top:2px}
.nc-body{flex:1;min-width:0}
.nc-paciente{font-weight:700;font-size:.88rem;color:var(--v);margin-bottom:2px}
.nc-msg{font-size:.83rem;line-height:1.4;margin-bottom:5px}
.nc-meta{font-size:.74rem;color:var(--gris);display:flex;gap:10px;flex-wrap:wrap}
.nc-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.sec-title{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--texto);font-weight:600;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec-title span{font-size:.75rem;font-weight:600;padding:2px 9px;border-radius:20px}
.sec-pend span{background:#fef4d8;color:#b07800}
.sec-lista span{background:#d1fae5;color:#059669}
.sec-hist span{background:var(--gc);color:var(--gris)}
@media print{#SB,.topbar,.mtabs,.no-print,.btn,button{display:none!important}#main{margin-left:0}.content{padding:0}body{background:#fff}}
#toast-msg{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--texto);color:#fff;border-radius:20px;padding:.6rem 1.2rem;font-size:.84rem;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast-msg.show{opacity:1;transform:translateX(-50%) translateY(0)}
.demo-banner{background:var(--ac);color:#fff;text-align:center;padding:6px;font-size:.77rem;font-weight:600;position:fixed;top:0;left:0;right:0;z-index:999;margin-left:230px}
/* CANAL SELECTOR */
.canal-opt{flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;border:2px solid var(--gc);border-radius:10px;cursor:pointer;background:#fff;transition:all .15s}
.canal-opt.sel-push{border-color:var(--v);background:var(--vp)}
.canal-opt.sel-wa{border-color:var(--wa);background:#e9fbe9}
.canal-opt input{accent-color:var(--v)}
/* LOGO en config */
.logo-preview{width:80px;height:80px;border-radius:10px;object-fit:contain;border:2px solid var(--gc);display:none}

/* ── RESPONSIVE MÓVIL ─────────────────────────────── */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--v);font-size:1.5rem;line-height:1;flex-shrink:0}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99}
.sb-overlay.open{display:block}

@media(max-width:700px){
  /* Mostrar hamburguesa */
  .hamburger{display:flex;align-items:center;justify-content:center}

  /* Sidebar oculto por defecto en móvil */
  #SB{transform:translateX(-100%);transition:transform .28s ease;z-index:150;width:240px}
  #SB.open{transform:translateX(0)}

  /* Main ocupa toda la pantalla */
  #main{margin-left:0!important;padding-top:32px}

  /* Demo banner sin margen */
  .demo-banner{margin-left:0}

  /* Topbar más compacta */
  .topbar{padding:10px 14px;gap:8px}
  .topbar h2{font-size:1rem}

  /* Buscador más pequeño */
  .sbox input{width:120px}

  /* Content con menos padding */
  .content{padding:14px 12px 80px}

  /* Grid de pacientes: 1 columna */
  .pgrid{grid-template-columns:1fr}

  /* Stats: 1 columna */
  .stats-grid{grid-template-columns:1fr;gap:8px}

  /* Ficha del paciente: campos en 2 col */
  .dfields{grid-template-columns:repeat(2,1fr)}

  /* Formularios: 1 columna */
  .fg{grid-template-columns:1fr!important}
  .fg.c3{grid-template-columns:1fr!important}

  /* Tabla de presion/glucemia: scroll horizontal */
  .mr.bp{grid-template-columns:80px 46px 46px 46px 70px 1fr auto auto;font-size:.74rem}
  .mr.gl{grid-template-columns:80px 60px 80px 60px 1fr auto;font-size:.74rem}

  /* Modal full width en móvil */
  .mbg{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-height:92vh;max-width:100%}

  /* Tabs scrolleables */
  .mtabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;gap:5px}
  .mtab{white-space:nowrap;font-size:.75rem;padding:6px 11px}

  /* Pin box más pequeño */
  .pin-box{width:90vw;max-width:300px}

  /* Bottom navigation bar en móvil */
  #mobile-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;z-index:80;
    background:var(--blanco);border-top:1px solid var(--gc);
    box-shadow:0 -4px 16px rgba(0,0,0,.08);
    padding:6px 0 env(safe-area-inset-bottom);
  }
  .mn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:6px 4px;cursor:pointer;border:none;background:none;
    color:var(--gris);font-size:.6rem;font-weight:500;font-family:'DM Sans',sans-serif;
    transition:color .15s;position:relative;
  }
  .mn-item .mn-ic{font-size:1.25rem;line-height:1}
  .mn-item.act{color:var(--v)}
  .mn-badge{position:absolute;top:2px;right:20%;background:var(--danger);color:#fff;font-size:.55rem;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
}

@media(min-width:701px){
  #mobile-nav{display:none!important}
  .hamburger{display:none!important}
}
</style>
</head>
<body>

<div class="demo-banner">🧪 MODO DEMO — Datos de prueba precargados. Logo, PIN y notificaciones se guardan localmente.</div>

<!-- Overlay para cerrar sidebar en móvil -->
<div class="sb-overlay" id="sb-overlay" onclick="closeSB()"></div>

<div id="APP">
  <div id="SB">
    <div class="sl">
      <div class="sl-top">
        <div class="sl-ic" id="sl-ic">💊</div>
        <div class="sl-tx"><h1>Farma<span>Avisa</span></h1><p>Farmacia de María</p></div>
      </div>
    </div>
    <nav class="snav">
      <div class="ni act" id="N-pacientes" onclick="SP('pacientes')"><span class="ni-ic">👥</span> Pacientes</div>
      <div class="ni" id="N-nuevo" onclick="SP('nuevo')"><span class="ni-ic">➕</span> Nuevo Paciente</div>
      <div class="ni" id="N-notifpanel" onclick="SP('notifpanel')"><span class="ni-ic">🔔</span> Notificaciones<span class="ni-badge" id="notif-badge" style="display:none">0</span></div>
      <div class="ni" id="N-usuarios" onclick="SP('usuarios')"><span class="ni-ic">👤</span> Usuarios</div>
      <div class="ni" id="N-config" onclick="SP('config')"><span class="ni-ic">⚙️</span> Configuración</div>
    </nav>
    <div class="sfooter">
      <div class="urow">
        <div class="uav">D</div>
        <div><div class="uname">Dueño Farmacia</div><div class="urole">👑 Dueño</div></div>
      </div>
    </div>
  </div>
  <div id="main" style="padding-top:28px">
    <div class="topbar">
      <!-- Hamburguesa solo en móvil -->
      <button class="hamburger" onclick="toggleSB()" aria-label="Menú">☰</button>
      <h2 id="TT">Pacientes</h2>
      <div class="topbar-r">
        <div class="sbox" id="GS-wrap"><span>🔍</span><input type="text" id="GS" placeholder="Buscar…" oninput="filterP()"/></div>
      </div>
    </div>
    <div class="content" id="CA"></div>
  </div>
</div>

<!-- Barra de navegación inferior para móvil -->
<nav id="mobile-nav" style="display:none">
  <button class="mn-item act" id="MN-pacientes" onclick="SP('pacientes');closeSB()">
    <span class="mn-ic">👥</span><span>Pacientes</span>
  </button>
  <button class="mn-item" id="MN-nuevo" onclick="SP('nuevo');closeSB()">
    <span class="mn-ic">➕</span><span>Nuevo</span>
  </button>
  <button class="mn-item" id="MN-notifpanel" onclick="SP('notifpanel');closeSB()" style="position:relative">
    <span class="mn-ic">🔔</span><span>Notif.</span>
    <span class="mn-badge" id="mn-badge" style="display:none">0</span>
  </button>

// Estructura: {id, paciente_id, paciente_nombre, paciente_tel, mensaje, fecha, hora, canal:'push'|'wa', estado:'pendiente'|'lista'|'enviada', creado_en}

function loadNotifs() {
  try { return JSON.parse(localStorage.getItem(NOTIFS_KEY)) || []; } catch(e) { return []; }
}
function saveNotifs(ns) { localStorage.setItem(NOTIFS_KEY, JSON.stringify(ns)); }

// ── ESTADO DE NOTIFICACIONES ──────────────────────────
// Actualiza 'pendiente' → 'lista' si ya llegó la fecha/hora
function actualizarEstados() {
  var ns = loadNotifs();
  var now = new Date();
  var changed = false;
  ns.forEach(function(n) {
    if (n.estado === 'pendiente') {
      var dt = new Date(n.fecha + 'T' + n.hora + ':00');
      if (now >= dt) { n.estado = 'lista'; changed = true; }
    }
  });
  if (changed) saveNotifs(ns);
  return ns;
}

// ── BADGE ─────────────────────────────────────────────
function updateBadge() {
  var ns = actualizarEstados();
  var listas = ns.filter(function(n){ return n.estado === 'lista'; }).length;
  // Badge sidebar
  var badge = document.getElementById('notif-badge');
  if (badge) { if(listas>0){badge.textContent=listas;badge.style.display='';}else{badge.style.display='none';} }
  // Badge barra móvil
  var mbadge = document.getElementById('mn-badge');
  if (mbadge) { if(listas>0){mbadge.textContent=listas;mbadge.style.display='';}else{mbadge.style.display='none';} }
}

// ── HELPERS ───────────────────────────────────────────
function uid() { return Date.now() + (Math.random()*9999|0); }
function tISO() { return new Date().toISOString().split('T')[0]; }
function nowHHMM() { var n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
function d2s(iso) { if(!iso)return'—'; var p=iso.split('T')[0].split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function addD(iso,n) { var d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function ini(p) { return ((p.nombre||'?')[0]+(p.apellido||'?')[0]).toUpperCase(); }

function uploadLogo(input) {
  var f=input.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    localStorage.setItem(LOGO_KEY,e.target.result);
    applyLogo(e.target.result);

    var prev=document.getElementById('logo-preview');
    if(prev){prev.src=e.target.result;prev.style.display='';}
    var lbl=document.getElementById('logo-lbl-config');
    if(lbl)lbl.textContent='📷 Cambiar logo';

  r.readAsDataURL(f);
}

}

}

  mc.innerHTML=h+'</div></div>';

// Vista desde la ficha del paciente
function rNotifEv(mc) {
  var p = _pat;
  var ns = loadNotifs().filter(function(n){ return n.paciente_id === p.id; });
  ns.sort(function(a,b){ return (a.fecha+a.hora) > (b.fecha+b.hora) ? 1 : -1; });

  var pendientes = ns.filter(function(n){ return n.estado==='pendiente'; });
  var listas     = ns.filter(function(n){ return n.estado==='lista'; });
  var historial  = ns.filter(function(n){ return n.estado==='enviada'; });

  var h = '<div class="card"><div class="card-hd"><span>🔔</span><h3>Notificaciones Eventuales</h3>'+
    '<button class="btn btn-purple btn-sm no-print" style="margin-left:auto;" onclick="oAddNotifEv()">+ Nueva</button>'+
    '</div><div class="card-bd">';

  if(!ns.length) {
    h+='<div class="empty"><span class="ei">🔔</span><p>Sin notificaciones programadas.<br><span style="font-size:.8rem;">Usá este panel para recordatorios puntuales: cita médica, buscar receta, etc.</span></p></div>';
  }

  // LISTAS PARA ENVIAR
  if(listas.length) {
    h+='<div class="sec-title sec-lista">🟢 Listas para enviar <span>'+listas.length+'</span></div>';
    listas.forEach(function(n){
      h+=ncCard(n,p,'lista');
    });
  }

  // PENDIENTES
  if(pendientes.length) {
    h+='<div class="sec-title sec-pend">🟡 Pendientes <span>'+pendientes.length+'</span></div>';
    pendientes.forEach(function(n){
      h+=ncCard(n,p,'pendiente');
    });
  }

  // HISTORIAL
  if(historial.length) {
    h+='<div class="sec-title sec-hist">⚫ Historial <span>'+historial.length+'</span></div>';
    historial.forEach(function(n){
      h+=ncCard(n,p,'historial');
    });
  }

  mc.innerHTML=h+'</div></div>';
}

function ncCard(n, p, estado) {
  var isLista    = estado === 'lista';
  var isPend     = estado === 'pendiente';
  var isHist     = estado === 'historial';
  var isWA       = n.canal === 'wa';
  var isPush     = n.canal === 'push';

  var canalIcon  = isWA ? '💬' : '🔔';
  var metaFecha  = '📅 '+d2s(n.fecha)+' · ⏰ '+n.hora+' hs';
  var canalLabel = isWA
    ? '<span class="sp" style="background:#e9fbe9;color:#128c7e;">💬 WhatsApp</span>'
    : '<span class="sp" style="background:#ede9fe;color:#7c3aed;">🔔 Push</span>';

  var actions = '';
  if(isLista && isWA) {
    actions += '<button class="btn btn-wa btn-sm" onclick="enviarWA(\''+n.id+'\')">📲 Enviar WhatsApp</button>';
  }
  if(isLista && isPush) {
    actions += '<span style="font-size:.78rem;color:var(--v);font-weight:600;">✅ Se enviará automáticamente</span>';
  }
  if(!isHist) {
    actions += '<button class="btn btn-danger btn-sm" onclick="eliminarNotif(\''+n.id+'\')">🗑 Eliminar</button>';
  }
  if(isHist) {
    actions += '<button class="btn btn-ghost btn-sm" onclick="eliminarNotif(\''+n.id+'\')">🗑 Eliminar del historial</button>';
  }

  return '<div class="nc '+estado+'">'+
    '<div class="nc-ic">'+canalIcon+'</div>'+
    '<div class="nc-body">'+
      '<div class="nc-msg">'+n.mensaje+'</div>'+
      '<div class="nc-meta">'+metaFecha+' '+canalLabel+'</div>'+
      (actions?'<div class="nc-actions">'+actions+'</div>':'')+
    '</div></div>';
}

function neToggleCanal() {
  var esPush = document.getElementById('ne_push').checked;
  document.getElementById('ne_info_push').style.display = esPush ? '' : 'none';
  document.getElementById('ne_info_wa').style.display   = esPush ? 'none' : '';
  document.getElementById('lbl-push').className = 'canal-opt ' + (esPush ? 'sel-push' : '');
  document.getElementById('lbl-wa').className   = 'canal-opt ' + (esPush ? '' : 'sel-wa');
}

function savNotifEv() {
  var msg   = document.getElementById('ne_msg').value.trim();
  var fecha = document.getElementById('ne_fecha').value;
  var hora  = document.getElementById('ne_hora').value;
  var canal = document.getElementById('ne_push').checked ? 'push' : 'wa';
  if(!msg)  { toast('Escribí el mensaje'); return; }
  if(!fecha){ toast('Elegí la fecha');     return; }
  if(!hora) { toast('Elegí la hora');      return; }
  if(canal==='wa' && !(_pat.telefono&&_pat.telefono.trim())) {
    toast('⚠️ El paciente no tiene teléfono cargado'); return;
  }

  // Determinar estado inicial
  var dt  = new Date(fecha+'T'+hora+':00');
  var now = new Date();
  var estado = now >= dt ? 'lista' : 'pendiente';

  var ns = loadNotifs();
  ns.push({
    id: uid(),
    paciente_id:  _pat.id,
    paciente_nombre: _pat.nombre + ' ' + _pat.apellido,
    paciente_tel: _pat.telefono || '',
    mensaje: msg,
    fecha:   fecha,
    hora:    hora,
    canal:   canal,
    estado:  estado,
    creado_en: new Date().toISOString()
  });
  saveNotifs(ns);
  updateBadge();
  CM();
  rMod('notifev');
  toast('✅ Notificación programada — estado: '+(estado==='lista'?'Lista para enviar':'Pendiente'));
}

// ENVIAR WA
function enviarWA(nid) {
  var ns  = loadNotifs();
  var n   = ns.find(function(x){ return String(x.id)===String(nid); });
  if(!n)  { toast('Notificación no encontrada'); return; }
  var tel = (n.paciente_tel||'').replace(/[\s\-().+]/g,'');
  if(!tel){ toast('⚠️ Sin teléfono cargado');    return; }
  var msgFinal = 'Farmacia de María te avisa: ' + n.mensaje;
  window.open('https://wa.me/'+tel+'?text='+encodeURIComponent(msgFinal),'_blank');
  // Marcar enviada → historial automáticamente
  n.estado = 'enviada';
  n.enviado_en = new Date().toISOString();
  saveNotifs(ns);
  updateBadge();
  rMod('notifev');
  toast('💬 WhatsApp abierto — mensaje movido al historial');
}

// ELIMINAR
function eliminarNotif(nid) {
  if(!confirm('¿Eliminar esta notificación?')) return;
  var ns = loadNotifs().filter(function(x){ return String(x.id)!==String(nid); });
  saveNotifs(ns);
  updateBadge();
  rMod('notifev');
}

    '</div>';

      if(n.canal==='wa'){
        var key = n.paciente_id+'_'+n.fecha+'_'+n.hora;

        waGrupos[key].nids.push(n.id);

        pushListas.push(n);
      }
    });

    // Renderizar grupos WA agrupados
    Object.values(waGrupos).forEach(function(g){
      var msgAgrupado = g.mensajes.length === 1 ? g.mensajes[0] : g.mensajes.map(function(m,i){ return (i+1)+'. '+m; }).join('\n');

            '<div class="nc-meta">📅 '+d2s(g.fecha)+' · ⏰ '+g.hora+' hs'+

            '</div>'+
            '<div class="nc-actions">'+
              '<button class="btn btn-wa btn-sm" onclick="enviarGrupoWA('+g.paciente_id+',\''+encodeURIComponent(JSON.stringify(g.nids))+'\',\''+encodeURIComponent(g.paciente_tel)+'\',\''+encodeURIComponent(msgAgrupado)+'\')">📲 Enviar WhatsApp</button>'+

            '</div>'+
          '</div>'+
        '</div>';
    });

    // Push listas (info solamente)
    pushListas.forEach(function(n){
      ca.innerHTML +=
        '<div class="nc lista">'+
          '<div class="nc-ic">🔔</div>'+
          '<div class="nc-body">'+

            '<div class="nc-msg">'+n.mensaje+'</div>'+

  // ── PENDIENTES ──────────────────────────────────────
  ca.innerHTML += '<div class="sec-title sec-pend">🟡 Pendientes <span>'+pendientes.length+'</span></div>';
  if(!pendientes.length) {
    ca.innerHTML += '<div style="background:var(--blanco);border-radius:var(--r);padding:16px 18px;color:var(--gris);font-size:.85rem;margin-bottom:14px;box-shadow:var(--sh);">Sin notificaciones pendientes.</div>';

          '<div class="nc-ic">'+(isWA?'💬':'🔔')+'</div>'+
          '<div class="nc-body">'+
            '<div class="nc-paciente">'+n.paciente_nombre+'</div>'+
            '<div class="nc-msg">'+n.mensaje+'</div>'+
            '<div class="nc-meta">📅 '+d2s(n.fecha)+' · ⏰ '+n.hora+' hs · '+(isWA?'<span style="color:var(--wa-dark);font-weight:600;">WhatsApp</span>':'<span style="color:var(--purple);font-weight:600;">Push</span>')+'</div>'+

            '</div>'+
          '</div>'+
        '</div>';
    });
  }

  // ── HISTORIAL ───────────────────────────────────────

          '</div>'+
        '</div>';
    });

// ENVIAR GRUPO WA AGRUPADO (panel global)
function enviarGrupoWA(pid, nidsEnc, telEnc, msgEnc) {
  var nids = JSON.parse(decodeURIComponent(nidsEnc));
  var tel  = decodeURIComponent(telEnc).replace(/[\s\-().+]/g,'');
  var msg  = decodeURIComponent(msgEnc);
  if(!tel){ toast('⚠️ Sin teléfono cargado'); return; }
  var msgFinal = 'Farmacia de María te avisa: ' + msg;
  window.open('https://wa.me/'+tel+'?text='+encodeURIComponent(msgFinal),'_blank');
  // Marcar todas como enviadas
  var ns = loadNotifs();
  ns.forEach(function(n){
    if(nids.indexOf(n.id) >= 0 || nids.indexOf(String(n.id)) >= 0) {
      n.estado = 'enviada';
      n.enviado_en = new Date().toISOString();
    }
  });
  saveNotifs(ns);
  updateBadge();
  rNotifPanel(document.getElementById('CA'));
  toast('💬 WhatsApp abierto — '+(nids.length>1?nids.length+' mensajes movidos al historial':'Mensaje movido al historial'));
}

function eliminarGrupoNotif(nidsEnc) {
  var nids = JSON.parse(decodeURIComponent(nidsEnc));
  if(!confirm('¿Eliminar '+(nids.length>1?nids.length+' notificaciones?':'esta notificación?'))) return;
  var ns = loadNotifs().filter(function(n){ return nids.indexOf(n.id)<0 && nids.indexOf(String(n.id))<0; });
  saveNotifs(ns);
  updateBadge();
  rNotifPanel(document.getElementById('CA'));
}

function limpiarHistorial() {
  if(!confirm('¿Eliminar todo el historial de notificaciones enviadas?')) return;
  var ns = loadNotifs().filter(function(n){ return n.estado !== 'enviada'; });
  saveNotifs(ns);
  rNotifPanel(document.getElementById('CA'));
  toast('🧹 Historial limpiado');
}

// ── USUARIOS ──────────────────────────────────────────
function rUsuarios(ca){
  var pin=getPin();
  ca.innerHTML=
    '<div class="card">'+
      '<div class="card-hd"><span>👤</span><h3>Usuarios del Sistema</h3>'+
        '<button class="btn btn-primary btn-sm no-print" style="margin-left:auto;" onclick="oAddUser()">+ Nuevo Usuario</button>'+
      '</div>'+
      '<div class="card-bd">'+
        '<div class="tip" style="margin-bottom:12px;"><strong>Empleados</strong> pueden editar pacientes pero NO pueden eliminar. Solo el <strong>Dueño</strong> puede eliminar (requiere PIN).</div>'+
        '<table class="tbl"><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th></th></tr></thead><tbody>'+
        DB.usuarios.map(function(u){
          var rol=u.rol==='owner'?'<span class="role-badge rb-owner">👑 Dueño</span>':'<span class="role-badge rb-staff">💼 Empleado</span>';
          var acc=u.rol==='owner'?'<span style="font-size:.75rem;color:var(--gris);">(sesión actual)</span>':'<button class="btn btn-danger btn-sm" onclick="delUser('+u.id+')">🗑</button>';
          return'<tr><td style="font-weight:600;">'+u.nombre+'</td><td style="font-size:.82rem;">'+u.email+'</td><td>'+rol+'</td><td>'+acc+'</td></tr>';
        }).join('')+
        '</tbody></table>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-hd"><span>🔐</span><h3>PIN de Seguridad</h3></div>'+
      '<div class="card-bd">'+
        '<p style="font-size:.83rem;color:var(--gris);margin-bottom:10px;">PIN actual: <strong>'+pin+'</strong> — Protege las acciones de eliminación.</p>'+
        '<div class="fg" style="max-width:300px;">'+
          '<div class="fp"><label>Nuevo PIN (4 dígitos)</label><input type="password" id="np1" maxlength="4" placeholder="····"/></div>'+
          '<div class="fp"><label>Repetir</label><input type="password" id="np2" maxlength="4" placeholder="····"/></div>'+
        '</div>'+
        '<button class="btn btn-primary" style="margin-top:8px;" onclick="changePin()">Guardar PIN</button>'+
      '</div>'+
    '</div>';
}
function oAddUser(){OM('👤 Nuevo Empleado','<div class="fg c1"><div class="fp"><label>Nombre *</label><input id="nu_n" placeholder="Juan Pérez"/></div><div class="fp"><label>Email *</label><input id="nu_e" type="email" placeholder="juan@farmaciademia.com"/></div><div class="fp"><label>Contraseña *</label><input id="nu_p" type="password" placeholder="Mínimo 4 caracteres"/></div></div>','<button class="btn btn-ghost" onclick="CM()">Cancelar</button><button class="btn btn-primary" onclick="savUser()">Crear</button>');}
function savUser(){var n=document.getElementById('nu_n').value.trim(),e=document.getElementById('nu_e').value.trim(),p=document.getElementById('nu_p').value;if(!n||!e||p.length<4){toast('Completá todos los campos');return;}if(DB.usuarios.find(function(x){return x.email===e;})){toast('Email ya registrado');return;}DB.usuarios.push({id:uid(),nombre:n,email:e,rol:'staff'});CM();SP('usuarios');toast('✅ Usuario creado');}
function delUser(uid_del){reqPin('Eliminar usuario — ingresá tu PIN',function(){DB.usuarios=DB.usuarios.filter(function(x){return x.id!==uid_del;});SP('usuarios');toast('Usuario eliminado');});}
function changePin(){var p1=document.getElementById('np1').value,p2=document.getElementById('np2').value;if(p1.length!==4||!/^\d{4}$/.test(p1)){toast('PIN debe ser 4 dígitos numéricos');return;}if(p1!==p2){toast('Los PINs no coinciden');return;}localStorage.setItem(PIN_KEY,p1);SP('usuarios');toast('✅ PIN actualizado');}

// ── CONFIGURACIÓN (con logo) ───────────────────────────
function rConfig(ca){
  var logoSrc = localStorage.getItem(LOGO_KEY);
  ca.innerHTML=
    '<div style="max-width:600px;display:flex;flex-direction:column;gap:14px;">'+

    // LOGO
    '<div class="card"><div class="card-hd"><span>🏥</span><h3>Logo de la Farmacia</h3></div><div class="card-bd">'+
      '<p style="font-size:.83rem;color:var(--gris);margin-bottom:12px;">El logo aparece en el sidebar y en las impresiones de fichas.</p>'+
      '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">'+
        (logoSrc?'<img id="logo-preview" src="'+logoSrc+'" class="logo-preview" style="display:block;"/>':'<img id="logo-preview" class="logo-preview"/>')+
        '<div>'+
          '<label class="btn btn-outline" style="cursor:pointer;" id="logo-lbl-config">'+
            (logoSrc?'📷 Cambiar logo':'📷 Subir logo')+
            '<input type="file" accept="image/*" style="display:none" onchange="uploadLogo(this)"/>'+
          '</label>'+
          (logoSrc?'<div style="margin-top:8px;"><button class="btn btn-danger btn-sm" onclick="removeLogo()">🗑 Eliminar logo</button></div>':'')+
        '</div>'+
      '</div>'+
    '</div></div>'+

    // NOTIFICACIONES
    '<div class="card"><div class="card-hd"><span>🔔</span><h3>Notificaciones Push</h3></div><div class="card-bd">'+
      '<p style="font-size:.83rem;color:var(--gris);margin-bottom:10px;">Estado: <strong id="notif-status">verificando…</strong></p>'+
      '<button class="btn btn-primary" onclick="reqNotifPerm()">🔔 Activar notificaciones</button>'+
      '<div class="tip" style="margin-top:10px;">⚠️ En modo demo (archivo local) las notificaciones push no funcionan. Sí funcionan al subir a Railway.</div>'+
    '</div></div>'+

    // CAMBIAR CONTRASEÑA
    '<div class="card"><div class="card-hd"><span>🔐</span><h3>Cambiar Contraseña</h3></div><div class="card-bd">'+
      '<div class="tip">⚠️ En modo demo los cambios no persisten. Sí funciona en el sistema real.</div>'+
    '</div></div>'+

    '</div>';

  setTimeout(function(){
    var el=document.getElementById('notif-status');if(!el)return;
    if(!('Notification' in window)){el.textContent='No soportado';}
    else if(Notification.permission==='granted'){el.style.color='var(--v)';el.textContent='✅ Activadas';}
    else if(Notification.permission==='denied'){el.style.color='var(--danger)';el.textContent='❌ Bloqueadas';}
    else{el.style.color='var(--ac)';el.textContent='⚠️ Sin configurar';}
  },100);
}
function removeLogo(){
  if(!confirm('¿Eliminar el logo?'))return;
  localStorage.removeItem(LOGO_KEY);
  document.getElementById('sl-ic').innerHTML='💊';
  rConfig(document.getElementById('CA'));
  toast('Logo eliminado');
}
function reqNotifPerm(){
  if(!('Notification' in window)){toast('No soportado en este navegador');return;}
  Notification.requestPermission().then(function(r){
    if(r==='granted')toast('🔔 Activadas — funcionarán al subir a Railway');
    else toast('Denegadas');
  });
}

// ── PIN ───────────────────────────────────────────────
var _pinCB=null,_pinCur='';
function reqPin(msg,cb){
  _pinCB=cb;_pinCur='';
  var d=document.createElement('div');d.className='pin-overlay';d.id='PIN_OV';
  d.innerHTML='<div class="pin-box"><h3>🔐 PIN Requerido</h3><p>'+msg+'</p>'+
    '<div class="pin-dots"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div>'+
    '<div class="pin-keys">'+[1,2,3,4,5,6,7,8,9].map(function(n){return'<button class="pin-key" onclick="pinKey(\''+n+'\')">'+n+'</button>';}).join('')+
    '<button class="pin-key del" onclick="pinKey(\'del\')">⌫</button>'+
    '<button class="pin-key" onclick="pinKey(\'0\')">0</button>'+
    '<button class="pin-key del" onclick="pinKey(\'cancel\')">✕</button>'+
    '</div><div class="pin-err" id="pin-err"></div></div>';
  document.body.appendChild(d);
}
function pinKey(k){
  if(k==='cancel'){document.getElementById('PIN_OV').remove();_pinCB=null;return;}
  if(k==='del')_pinCur=_pinCur.slice(0,-1);
  else if(_pinCur.length<4)_pinCur+=k;
  for(var i=0;i<4;i++){var dot=document.getElementById('pd'+i);if(dot)dot.classList.toggle('filled',i<_pinCur.length);}
  if(_pinCur.length===4){
    if(_pinCur===getPin()){document.getElementById('PIN_OV').remove();if(_pinCB)_pinCB();_pinCB=null;_pinCur='';}
    else{document.getElementById('pin-err').textContent='PIN incorrecto';_pinCur='';for(var j=0;j<4;j++){var d2=document.getElementById('pd'+j);if(d2)d2.classList.remove('filled');}}
  }
}

// ── INIT ──────────────────────────────────────────────
window.addEventListener('load', function() {
  loadLogo();
  actualizarEstados();
  updateBadge();
  SP('pacientes');

  // Mostrar/ocultar barra móvil según tamaño pantalla
  function checkMobile() {
    var isMobile = window.innerWidth <= 700;
    document.getElementById('mobile-nav').style.display = isMobile ? 'flex' : 'none';
  }
  checkMobile();
  window.addEventListener('resize', checkMobile);

  // Actualizar estados y badge cada minuto
  setInterval(function(){
    actualizarEstados();
    updateBadge();
    if(document.getElementById('N-notifpanel').classList.contains('act')){
      rNotifPanel(document.getElementById('CA'));
    }
  }, 60000);
});
</script>
